openapi: 3.0.0
paths:
  /api/products/{id}:
    get:
      summary: Get a product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
        '404':
          description: Product not found
    put:
      summary: Update a product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                artistName:
                  type: string
                coverArt:
                  type: string
                  format: binary
      responses:
        '200':
          description: Product updated successfully
        '400':
          description: Validation error
        '404':
          description: Product not found
    delete:
      summary: Delete a product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product deleted successfully
        '404':
          description: Product not found
  /api/products:
    post:
      summary: Create a new product
      description: Create a product with name, artist, and cover art image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - artistName
                - coverArt
              properties:
                name:
                  type: string
                artistName:
                  type: string
                coverArt:
                  type: string
                  format: binary
      responses:
        '201':
          description: Product created successfully
        '400':
          description: Validation error
    get:
      summary: Get all products
      responses:
        '200':
          description: List of products